name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0

jobs:
  tools:
    name: Tools tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-tools-${{ runner.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'tools/**/*.zig', 'src/**/*.zig') }}
          restore-keys: |
            zig-tools-${{ runner.os }}-

      - name: Run tools tests
        run: zig build test-tools

  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # [windows-latest], bun is crashing on windows
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            docs/node_modules
            npm/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig', 'tools/**/*.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: |
            test/parser/suite
            profiler/files
          key: test-data-${{ hashFiles('test/parser/load.ts', 'profiler/load-parser-bench-files.ts') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load test data
        run: bun run load-files

      - name: Build native bindings
        run: bun run build:npm

      - name: Zig build
        run: zig build

      - name: Build wasm packages
        run: bun run build:wasm

      - name: Check generated files are current
        run: |
          git diff --exit-code -- \
            npm/yuku-parser/decode.js \
            npm/yuku-codegen/encode.js \
            npm/yuku-analyzer/decode.js \
            npm/yuku-analyzer/index.d.ts \
            npm/yuku-analyzer/engine.js \
            npm/yuku-parser-wasm/decode.js \
            npm/yuku-parser-wasm/walk.js \
            npm/yuku-parser-wasm/index.d.ts \
            npm/yuku-codegen-wasm/encode.js \
          || { echo "::error::Generated files are out of date. Run 'bun run build:npm && bun run build:wasm' and commit the result."; exit 1; }

      - name: Zig tests
        run: zig build test

      - name: Parser conformance
        if: ${{ !cancelled() }}
        run: bun run test:parser

      - name: Codegen conformance
        if: ${{ !cancelled() }}
        run: bun run test:codegen

      - name: Analyzer conformance
        if: ${{ !cancelled() }}
        run: bun run test:analyzer

      - name: Sourcemap conformance
        if: ${{ !cancelled() }}
        run: bun run test:sourcemap
