name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0

jobs:
  tools:
    name: Tools tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .zig-cache
          key: zig-tools-${{ runner.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'tools/**/*.zig', 'src/**/*.zig') }}
          restore-keys: |
            zig-tools-${{ runner.os }}-

      - name: Run tools tests
        run: zig build test-tools

  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Harden the runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig', 'tools/**/*.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Cache test data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            test/parser/suite
          key: test-data-v8-${{ hashFiles('test/parser/load.ts') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load test data
        run: bun run fetch:fixtures

      - name: Build native binding
        run: bun run build:local

      - name: Zig build
        run: zig build

      - name: Build wasm packages
        run: bun run build:wasm

      - name: Zig tests
        run: zig build test

      - name: Parser conformance
        if: ${{ !cancelled() }}
        run: bun run test:parser

      - name: Codegen conformance
        if: ${{ !cancelled() }}
        run: bun run test:codegen

      - name: Analyzer conformance
        if: ${{ !cancelled() }}
        run: bun run test:analyzer

      - name: Sourcemap conformance
        if: ${{ !cancelled() }}
        run: bun run test:sourcemap
