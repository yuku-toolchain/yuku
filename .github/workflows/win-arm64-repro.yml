name: win-arm64 repro

# Reproduction for the win32-arm64 crash reported against yuku 0.6.x
# (segfault at first use, x64 green in the same run). The version bisect
# run pinned it to the napi-zig upgrade between 0.6.3 and 0.6.4. This
# revision drills into the crash location with staged loading and cdb.

on:
  push:
    branches: [win-arm64-repro]
  workflow_dispatch:

jobs:
  fixed-build:
    name: cross-compile with patched napi-zig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build yuku-parser for aarch64-windows
        run: zig build -Dtarget=aarch64-windows --release=fast

      - uses: actions/upload-artifact@v4
        with:
          name: patched-arm64-binding
          path: zig-out/lib/yuku-parser.node

  fixed-test:
    name: patched binding on win-arm64
    needs: fixed-build
    runs-on: windows-11-arm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          name: patched-arm64-binding
          path: patched

      - name: Stage repro against the patched binding
        shell: bash
        run: |
          mkdir repro-fixed && cd repro-fixed
          npm init -y > /dev/null
          npm i yuku-parser@0.6.9
          cp ../patched/yuku-parser.node node_modules/@yuku-parser/binding-win32-arm64/yuku-parser.node
          cat > repro.mjs <<'EOF'
          import { parse } from "yuku-parser";

          const unit = (i) => `
          export interface Config${i} {
            name: string;
            value: number;
            nested: { a: string[]; b?: Map<string, number[]> };
          }
          export function fn${i}<T extends object>(x: T, y: number = ${i}): T & Config${i} {
            const z = [...Array(16).keys()].map((k) => k * ${i});
            return { ...x, name: "n${i}", value: z.reduce((a, b) => a + b, 0), nested: { a: ["a"] } } as T & Config${i};
          }
          `;
          let big = "";
          for (let i = 0; i < 1500; i++) big += unit(i);

          const small = parse("let x = 1", { lang: "js" });
          console.log("small parse ok, keys:", Object.keys(small).join(","));
          for (let round = 0; round < 10; round++) {
            const result = parse(big, { lang: "ts" });
            if (!result.program) throw new Error("no program");
          }
          console.log("ALL OK with patched napi-zig");
          EOF
          node repro.mjs

  localize:
    name: localize crash (win-arm64, yuku 0.6.9)
    runs-on: windows-11-arm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stage repro project
        shell: bash
        run: |
          mkdir repro && cd repro
          npm init -y > /dev/null
          npm i yuku-parser@0.6.9
          cat > stage1.mjs <<'EOF'
          console.log("stage1: about to import binding");
          const binding = (await import("yuku-parser/binding.js")).default;
          console.log("stage1: binding loaded, keys:", Object.keys(binding).join(","));
          EOF
          cat > stage2.mjs <<'EOF'
          const binding = (await import("yuku-parser/binding.js")).default;
          console.log("stage2: binding loaded");
          const raw = binding.parse("let x = 1", {});
          console.log("stage2: raw parse ok, type:", Object.prototype.toString.call(raw));
          EOF
          cat > stage3.mjs <<'EOF'
          const { parse } = await import("yuku-parser");
          console.log("stage3: parse imported");
          const result = parse("let x = 1", { lang: "js" });
          console.log("stage3: full parse + decode ok, keys:", Object.keys(result).join(","));
          EOF

      - name: "Stage 1: dlopen + module registration only"
        shell: bash
        working-directory: repro
        continue-on-error: true
        run: node stage1.mjs

      - name: "Stage 2: one raw binding.parse call"
        shell: bash
        working-directory: repro
        continue-on-error: true
        run: node stage2.mjs

      - name: "Stage 3: full parse via public API"
        shell: bash
        working-directory: repro
        continue-on-error: true
        run: node stage3.mjs

      - name: Locate cdb
        id: cdb
        shell: bash
        continue-on-error: true
        run: |
          for p in "/c/Program Files (x86)/Windows Kits/10/Debuggers/arm64/cdb.exe" \
                   "/c/Program Files (x86)/Windows Kits/10/Debuggers/x64/cdb.exe"; do
            if [ -x "$p" ]; then
              echo "found: $p"
              echo "path=$p" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "cdb not found, listing debugger dirs:"
          ls "/c/Program Files (x86)/Windows Kits/10/Debuggers" 2>/dev/null || true
          exit 1

      - name: Run crashing stage under cdb without debug heap
        if: steps.cdb.outputs.path != ''
        shell: bash
        working-directory: repro
        continue-on-error: true
        run: |
          NODEPATH=$(command -v node)
          "${{ steps.cdb.outputs.path }}" -hd -g -G -o -c 'g; !analyze -v; lm; r; u @$ip-0x20 @$ip+0x14; k 30; q' "$NODEPATH" stage2.mjs

      - name: Capture WER crash dump as fallback
        shell: pwsh
        working-directory: repro
        continue-on-error: true
        run: |
          $dumps = "$env:GITHUB_WORKSPACE\dumps"
          New-Item -ItemType Directory -Force -Path $dumps | Out-Null
          $key = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
          New-Item -Path $key -Force | Out-Null
          Set-ItemProperty -Path $key -Name DumpFolder -Value $dumps
          Set-ItemProperty -Path $key -Name DumpType -Value 2 -Type DWord
          node stage2.mjs
          if ($LASTEXITCODE -ne 0) { Write-Host "crashed with $LASTEXITCODE" }
          Start-Sleep -Seconds 5
          Get-ChildItem $dumps

      - name: Analyze crash dump
        if: steps.cdb.outputs.path != ''
        shell: bash
        continue-on-error: true
        run: |
          dump=$(ls "$GITHUB_WORKSPACE"/dumps/*.dmp 2>/dev/null | head -1)
          if [ -z "$dump" ]; then echo "no dump captured"; exit 0; fi
          "${{ steps.cdb.outputs.path }}" -z "$dump" -c '!analyze -v; lm; r; u @$ip-0x20 @$ip+0x14; k 30; q'
