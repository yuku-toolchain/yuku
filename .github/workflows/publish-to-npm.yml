name: Publish to NPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load files
        run: bun run fetch:fixtures

      - name: Build
        run: bun run build:npm

      - name: Build wasm
        run: bun run build:wasm

      - name: Generate changelog
        run: bunx changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update npm
        # Pin to npm 11.x: npm 12.0.0 fails provenance publishing with
        # "Cannot find module 'sigstore'" because the module isn't bundled.
        # https://github.com/npm/cli/issues/9722
        run: npm install -g npm@11

      - name: Publish packages to npm
        run: bun napi-zig publish
