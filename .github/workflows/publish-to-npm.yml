name: Publish to NPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Release Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write # changelogithub creates the GitHub Release
      id-token: write # OIDC for npm provenance / trusted publishing
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
          use-cache: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Pinned exact: this Node bundles npm 11.16.0. npm 12.0.0 breaks
          # provenance publishing (npm/cli#9722), and every Node 24.x ships
          # npm 11, so pinning here removes the need for an ad-hoc npm install.
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:npm

      - name: Build wasm
        run: bun run build:wasm

      - name: Generate changelog
        run: bunx changelogithub@14.0.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages to npm
        run: bun napi-zig publish
