# zizmor configuration: https://docs.zizmor.sh/configuration/
rules:
  cache-poisoning:
    ignore:
      # actions/setup-node sets no `cache:` input, so it restores no cache and
      # cannot be a cache-poisoning sink. The real caching actions in this job
      # (setup-zig, setup-bun) are disabled through their use-cache / no-cache
      # inputs, which zizmor detects directly, not through this ignore.
      - publish-to-npm.yml
