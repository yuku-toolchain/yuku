<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yuku playground</title>
    <link rel="stylesheet" href="/style.css" />
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("yuku-theme") || "dark";
    </script>
    <script type="importmap">
      {
        "imports": {
          "@yuku-parser/wasm": "https://esm.sh/@yuku-parser/wasm",
          "@yuku-codegen/wasm": "https://esm.sh/@yuku-codegen/wasm",
          "yuku-ast": "https://esm.sh/yuku-ast"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <div class="brand">yuku<span id="version" class="version" data-pkg="https://esm.sh/@yuku-parser/wasm"></span></div>
      <div class="opts">
        <label>
          lang
          <select id="lang">
            <option>js</option>
            <option selected>ts</option>
            <option>jsx</option>
            <option>tsx</option>
            <option>dts</option>
          </select>
        </label>
        <label>
          source
          <select id="sourceType">
            <option value="module">module</option>
            <option value="script">script</option>
          </select>
        </label>
        <label class="chk"><input type="checkbox" id="preserveParens" checked /> preserveParens</label>
        <label class="chk"><input type="checkbox" id="allowReturnOutsideFunction" /> allowReturn</label>
        <label class="chk"><input type="checkbox" id="semanticErrors" /> semanticErrors</label>
        <label class="chk"><input type="checkbox" id="attachComments" /> attachComments</label>
      </div>
      <button id="theme" class="theme">dark</button>
    </header>
    <main>
      <section class="pane">
        <div class="pane-head">source</div>
        <div id="code" class="view editor" spellcheck="false"></div>
      </section>
      <section class="pane">
        <div class="pane-head">ast</div>
        <div id="ast" class="view tree"></div>
      </section>
      <section class="pane">
        <div class="pane-head">
          output
          <div class="opts">
            <label class="chk" title="drop TypeScript-only syntax"><input type="checkbox" id="strip" /> strip</label>
            <label class="chk" title="size-reducing syntax rewrites"><input type="checkbox" id="minify" /> minify</label>
            <select id="format" title="format">
              <option>pretty</option>
              <option>compact</option>
            </select>
            <select id="quotes" title="quotes">
              <option>preserve</option>
              <option>double</option>
              <option>single</option>
              <option>shortest</option>
            </select>
            <select id="comments" title="comments">
              <option>some</option>
              <option>all</option>
              <option>none</option>
              <option>line</option>
              <option>block</option>
            </select>
            <input id="indent" type="number" min="0" max="16" value="2" title="indent" />
          </div>
        </div>
        <pre id="out" class="view"></pre>
      </section>
    </main>
    <div id="status">ok</div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
